<!DOCTYPE html>
<html lang="en">
{%load static%}
<head>
    <meta charset="UTF-8">

    <!-- FAVICON -->
    <link rel="icon" href="{% static 'favicon/favicon.ico' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon/favicon-32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon/favicon-16.png' %}">

    <title>EduSphere</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    
</head>

<body>

<!-- TOP NAVBAR -->
{% block navbar %}
    {% include 'common/navbar_dashboard.html' %}
{% endblock %}

{% block full_page %}
<!-- DEFAULT DASHBOARD LAYOUT -->

<div class="container-fluid">
    <div class="row" style="height: calc(100vh - 75px);">

        <!-- SIDEBAR -->
        <div class="col-2 sidebar p-0" id="sidebar">
            <script>
                if (localStorage.getItem('sidebarCollapsed') === 'true') {
                    document.getElementById('sidebar').classList.add('collapsed');
                }
            </script>
            {% block sidebar %}
            {% endblock %}
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-10 p-4" id="mainContent">
            {% block content %}
            {% endblock %}
        </div>

    </div>
</div>

{% endblock %}

<!-- FOOTER -->
<footer class="custom-footer text-center">
    © 2026 | Developed by <strong>Om</strong>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const toggleBtn = document.getElementById('sidebarToggle');
    const sidebar = document.getElementById('sidebar');

    if (!toggleBtn || !sidebar) return;

    toggleBtn.addEventListener('click', function (e) {
        e.preventDefault();
        sidebar.classList.toggle('collapsed');
        localStorage.setItem(
            'sidebarCollapsed',
            sidebar.classList.contains('collapsed')
        );
    });

});
</script>



</body>
</html>
