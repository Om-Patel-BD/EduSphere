{% extends 'base.html' %}

{% block sidebar %}
{% include 'admin/sidebar.html' %}
{% endblock %}

{% block content %}

<h4 class="manage-students-title">
    <i class="fas fa-users me-2"></i> Manage Students
</h4>

<!-- ADD STUDENT -->
<div class="card manage-students-card p-4 mb-4">

    <h6 class="mb-3 text-center ms_title">Add Student</h6>

    <form method="post" class="manage-students-form">
        {% csrf_token %}
        <input type="hidden" name="add_student">

        <div class="input-with-icon">
    <i class="fas fa-user"></i>
    <input type="text" name="name" class="form-control" placeholder="Student Name">
</div>

<div class="input-with-icon">
    <i class="fas fa-id-card"></i>
    <input type="text" name="roll_no" class="form-control" placeholder="Roll No">
</div>

<div class="input-with-icon">
    <i class="fas fa-layer-group"></i>
    <input type="text" name="semester" class="form-control" placeholder="Semester">
</div>

        <div class="manage-students-submit">
            <button class="btn btn-success manage-students-btn">
                <i class="bi bi-plus-circle"></i> Add Student
            </button>
        </div>

    </form>
</div>

<!-- STUDENT LIST -->
<div class="card manage-students-card p-4">

    <h6 class="mb-3 text-center ms_title">All Students</h6>

    <div class="table-responsive">

        <table class="table manage-students-table">

            <thead>
                <tr>
                    <th>Student</th>
                    <th>Roll No</th>
                    <th>Semester</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                {% for s in students %}
                <tr>
                    <form method="post">
                        {% csrf_token %}
                        <input type="hidden" name="student_id" value="{{ s.id }}">

                        <td>
                            <div class="input-with-icon">
                                <i class="bi bi-person-circle"></i>
                                <input name="name" value="{{ s.name }}" class="form-control text-center ps-5">
                            </div>
                        </td>

                        <td>
                            <input name="roll_no" value="{{ s.roll_no }}" class="form-control text-center">
                        </td>

                        <td>
                            <input name="semester" value="{{ s.semester }}" class="form-control text-center">
                        </td>

                        <td class="manage-actions">
                            <button name="edit_student" class="btn btn-success btn-sm">
                                <i class="bi bi-check-circle"></i>
                            </button>

                            <button name="delete_student"
                                    class="btn btn-danger btn-sm"
                                    onclick="return confirm('Delete this student?')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>

                    </form>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

{% endblock %}
